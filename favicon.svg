<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="3" fill="#0d0d0d"/>

  <!-- Base vertical bar -->
  <line x1="12" y1="7" x2="12" y2="25" stroke="#c8ff00" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Base lead (left) -->
  <line x1="2" y1="16" x2="12" y2="16" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>

  <!-- Collector: diagonal from bar, then stub up -->
  <line x1="12" y1="10" x2="25" y2="4" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="2" x2="25" y2="6" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>

  <!-- Emitter: diagonal from bar, then stub down -->
  <line x1="12" y1="22" x2="25" y2="28" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="26" x2="25" y2="30" stroke="#c8ff00" stroke-width="2" stroke-linecap="round"/>

  <!-- Emitter arrow (NPN: pointing outward, toward emitter terminal) -->
  <!-- Emitter direction: (13, 6), normalized ≈ (0.908, 0.419) -->
  <!-- Tip at (22, 26.6), back at (18.4, 25.1), wings at (17.7,26.9) and (19.1,23.3) -->
  <polygon points="22.5,26.6 17.8,26.8 19.2,23.2" fill="#c8ff00"/>
</svg>
